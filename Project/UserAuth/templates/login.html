{% extends "base.html" %}

{% block title %}Login{% endblock title %}

{% block content %}

<section class="min-h-screen flex items-center justify-center bg-gradient-to-br from-green-50 to-emerald-100">

<div class="bg-white shadow-2xl rounded-2xl p-10 w-full max-w-md">

<!-- Logo / Title -->

<div class="text-center mb-8">
<h2 class="text-3xl font-bold text-gray-800">Welcome Back</h2>
<p class="text-gray-500 text-sm mt-2">
Login to your WasteTracker account
</p>
</div>

<form method="POST">

{% csrf_token %}

<!-- Email -->

<div class="mb-5">
<label class="block text-sm text-gray-700 mb-1">Email</label>

<div class="flex items-center border rounded-lg px-3">
<span class="text-gray-400 mr-2">📧</span>
<input
type="email"
name="email"
placeholder="Enter your email"
class="w-full py-2 outline-none">
</div>

</div>

<!-- Password -->

<div class="mb-6">
<label class="block text-sm text-gray-700 mb-1">Password</label>

<div class="flex items-center border rounded-lg px-3">
<span class="text-gray-400 mr-2">🔒</span>
<input
type="password"
name="password"
placeholder="Enter password"
class="w-full py-2 outline-none">
</div>

</div>

<button
type="submit"
class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">
Login </button>

</form>

<div class="text-center text-sm text-gray-600 mt-6">

<p>
Don't have an account?
<a href="{% url 'register' %}" class="text-green-600 font-medium hover:underline">
Create Account
</a>
</p>

<p class="mt-2">
<a href="#" class="hover:text-green-600">
Forgot Password?
</a>
</p>

</div>

</div>

</section>

{% endblock content %}
