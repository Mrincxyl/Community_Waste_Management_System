{% extends "base.html" %}

{% block title %}Sign Up{% endblock title %}

{% block content %}

<section class="min-h-screen flex items-center justify-center bg-gradient-to-br from-green-50 to-emerald-100">

<div class="bg-white shadow-2xl rounded-2xl p-10 w-full max-w-lg">

<div class="text-center mb-8">
<h2 class="text-3xl font-bold text-gray-800">Create Account</h2>
<p class="text-gray-500 text-sm mt-2">
Join WasteTracker and help keep the community clean
</p>
</div>

<form method="POST">

{% csrf_token %}

<!-- Name -->

<div class="mb-4">
<label class="block text-sm text-gray-700 mb-1">Full Name</label>

<div class="flex items-center border rounded-lg px-3">
<span class="text-gray-400 mr-2">👤</span>
<input
type="text"
name="name"
placeholder="Enter your name"
class="w-full py-2 outline-none">
</div>

</div>

<!-- Email -->

<div class="mb-4">
<label class="block text-sm text-gray-700 mb-1">Email</label>

<div class="flex items-center border rounded-lg px-3">
<span class="text-gray-400 mr-2">📧</span>
<input
type="email"
name="email"
placeholder="Enter your email"
class="w-full py-2 outline-none">
</div>

</div>

<!-- Phone -->

<div class="mb-4">
<label class="block text-sm text-gray-700 mb-1">Phone</label>

<div class="flex items-center border rounded-lg px-3">
<span class="text-gray-400 mr-2">📱</span>
<input
type="text"
name="phone"
placeholder="Enter phone number"
class="w-full py-2 outline-none">
</div>

</div>

<!-- Password -->

<div class="mb-4">
<label class="block text-sm text-gray-700 mb-1">Password</label>

<div class="flex items-center border rounded-lg px-3">
<span class="text-gray-400 mr-2">🔒</span>
<input
type="password"
name="password"
placeholder="Create password"
class="w-full py-2 outline-none">
</div>

</div>

<!-- Confirm Password -->

<div class="mb-6">
<label class="block text-sm text-gray-700 mb-1">Confirm Password</label>

<div class="flex items-center border rounded-lg px-3">
<span class="text-gray-400 mr-2">🔐</span>
<input
type="password"
name="confirm_password"
placeholder="Confirm password"
class="w-full py-2 outline-none">
</div>

</div>

<button
type="submit"
class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">
Create Account </button>

</form>

<div class="text-center text-sm text-gray-600 mt-6">

<p>
Already have an account?
<a href="{% url 'login' %}" class="text-green-600 font-medium hover:underline">
Login
</a>
</p>

</div>

</div>

</section>

{% endblock content %}
