<!-- Floating Chat Button -->

<button onclick="toggleChat()"
class="fixed bottom-6 right-6 bg-green-600 hover:bg-green-700 text-white w-14 h-14 rounded-full shadow-lg text-2xl flex items-center justify-center">
💬 </button>

<!-- Chatbot Window -->

<div id="chatBox"
class="hidden fixed bottom-24 right-6 w-80 bg-white rounded-xl shadow-2xl border flex flex-col">

<!-- Header -->

<div class="bg-green-600 text-white px-4 py-3 rounded-t-xl font-semibold">
Support Chat
</div>

<!-- Messages -->

<div id="chatMessages"
class="p-4 h-64 overflow-y-auto text-sm space-y-3 bg-gray-50">

<div class="bg-gray-200 p-2 rounded-lg w-fit max-w-[80%]">
Hi 👋 How can I help you today?
</div>

</div>

<!-- Input -->

<div class="border-t p-3 flex gap-2">

<input
id="chatInput"
type="text"
placeholder="Type your message..."
class="flex-1 px-3 py-2 border rounded-md text-sm outline-none">

<button onclick="sendMessage()"
class="bg-green-600 text-white px-3 rounded-md hover:bg-green-700">
Send </button>

</div>

<!-- Query Form Button -->

<div class="p-3 border-t text-center">

<button onclick="showQueryForm()"
class="text-green-600 text-sm hover:underline">
Submit a detailed query </button>

</div>

</div>

<!-- Query Form -->

<div id="queryForm"
class="hidden fixed bottom-24 right-6 w-80 bg-white rounded-xl shadow-2xl border">

<div class="bg-green-600 text-white px-4 py-3 rounded-t-xl font-semibold">
Submit Query
</div>

<form class="p-4 space-y-2">

<input
type="text"
placeholder="Your Name"
class="w-full px-3 py-2 border rounded-md text-sm">

<input
type="email"
placeholder="Your Email"
class="w-full px-3 py-2 border rounded-md text-sm">

<textarea
rows="3"
placeholder="Describe your issue..."
class="w-full px-3 py-2 border rounded-md text-sm"></textarea>

<button
type="submit"
class="w-full bg-green-600 text-white py-2 rounded-md hover:bg-green-700">
Submit </button>

</form>

</div>

<script>

function toggleChat(){
document.getElementById("chatBox").classList.toggle("hidden");
}

function sendMessage(){

let input = document.getElementById("chatInput");
let message = input.value.trim();

if(message === "") return;

let chat = document.getElementById("chatMessages");

let userMsg = document.createElement("div");
userMsg.className = "bg-green-500 text-white p-2 rounded-lg w-fit max-w-[80%] ml-auto";
userMsg.innerText = message;

chat.appendChild(userMsg);

input.value = "";
chat.scrollTop = chat.scrollHeight;

}

function showQueryForm(){

document.getElementById("chatBox").classList.add("hidden");
document.getElementById("queryForm").classList.remove("hidden");

}

</script>
