{% load static %}

<nav class="absolute top-0 left-0 w-full z-50 backdrop-blur-md bg-black/40">

  <div class="w-full px-8 py-4 flex items-center">


<!-- LEFT : Logo + Title -->
<div class="flex items-center gap-3">

  <img src="{% static 'images/logo.png' %}"
       alt="logo"
       class="h-14 w-14 object-contain">

  <span class="text-white font-semibold text-xl">
   <a href="{% url 'home' %}">WasteTracker</a>
  </span>

</div>

<!-- CENTER : Search -->
<div class="flex-grow flex justify-center">
    {% include "searchbox.html" %}
</div>

<!-- RIGHT : Menu -->
<div class="flex items-center gap-8 text-white font-medium">

  <a href="{% url "home" %}" class="hover:text-green-300 transition">
    Home
  </a>

  

  <a href="{% url 'find_collection' %}" class="hover:text-green-300 transition">
    Find Collection
  </a>

    {% if user.is_authenticated %}

          <a href="{% url 'report_waste' %}" class="hover:text-green-300 transition">
          Report Waste
          </a>

          <a href="#" class="hover:text-green-300 transition">
            My Reports
          </a>
        <!-- Profile -->
        <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-gray-100 hover:bg-gray-200 transition cursor-pointer">
          <div class="w-8 h-8 flex items-center justify-center rounded-full bg-indigo-500 text-white font-bold">
            {{ user.username|first|upper }}
          </div>
          <span class="text-sm font-medium text-gray-800">
            {{ user.username }}
          </span>
        </div>

        <a href="{% url 'logout' %}"
          class="px-4 py-2 rounded-lg text-white bg-gradient-to-r from-red-500 to-pink-500 hover:from-red-600 hover:to-pink-600 shadow-md transition">
          Logout
        </a>
        {% else %}

        <a href="{% url 'login' %}" class="hover:text-green-300 transition">
        Login
        </a>

        <a href="{% url 'register' %}" class="bg-green-500 hover:bg-green-600 px-5 py-2 rounded-lg font-semibold transition">
          Sign Up
        </a>
        {% endif  %}

</div>


  </div>

</nav>
