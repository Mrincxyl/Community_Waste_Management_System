{% extends "base.html" %}

{% block title %}Report Waste{% endblock title %}

{% block content %}

<section class="min-h-screen bg-gradient-to-br from-green-50 via-white to-emerald-50 py-16">

<div class="max-w-3xl mx-auto bg-white shadow-2xl rounded-2xl p-10">

<!-- Heading -->

<div class="text-center mb-10">

<h1 class="text-3xl font-bold text-gray-800">
Report Waste Issue
</h1>

<p class="text-gray-500 mt-2">
Upload an image and mark the exact waste location on the map.
</p>

</div>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<!-- Upload Image -->

<div class="mb-8">

<label class="block text-gray-700 font-semibold mb-2">
Upload Waste Image
</label>

<input 
type="file"
name="image"
id="imageUpload"
class="w-full border rounded-lg p-2">

<img id="preview" class="mt-4 hidden rounded-lg shadow-md"/>

</div>

<!-- Waste Type -->

<div class="mb-6">

<label class="block text-gray-700 font-semibold mb-2">
Waste Type
</label>

<select
name="waste_type"
class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-green-400 outline-none">

<option>Plastic Waste</option>
<option>Food Waste</option>
<option>Construction Waste</option>
<option>Electronic Waste</option>
<option>Other</option>

</select>

</div>

<!-- Description -->

<div class="mb-8">

<label class="block text-gray-700 font-semibold mb-2">
Description
</label>

<textarea
name="description"
rows="4"
placeholder="Describe the waste issue..."
class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-green-400 outline-none">
</textarea>

</div>

<!-- Location Section -->

<div class="mb-6">

<label class="block text-gray-700 font-semibold mb-2">
Location
</label>

<button
type="button"
onclick="getLocation()"
class="bg-green-600 text-white px-5 py-2 rounded-lg hover:bg-green-700 transition">

📍 Detect My Location

</button>

<span id="locationStatus"
class="ml-3 text-sm text-gray-500">

Location not detected

</span>

</div>

<!-- Map -->

<div id="map" class="w-full h-80 rounded-xl border mb-8"></div>

<!-- Hidden Coordinates -->

<input type="hidden" name="latitude" id="lat">
<input type="hidden" name="longitude" id="lon">

<!-- Submit -->

<button
type="submit"
class="w-full bg-gradient-to-r from-green-600 to-emerald-600 text-white py-3 rounded-lg text-lg font-semibold hover:scale-[1.02] transition">

Submit Waste Report

</button>

</form>

</div>

</section>

<!-- Leaflet Map Library -->

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* -------------------------
IMAGE PREVIEW
------------------------- */

document.getElementById("imageUpload").addEventListener("change", function(event){

const file = event.target.files[0];
const preview = document.getElementById("preview");

if(file){

preview.src = URL.createObjectURL(file);
preview.classList.remove("hidden");
preview.classList.add("w-full");

}

});



/* -------------------------
MAP INITIALIZATION
------------------------- */

let map = L.map('map').setView([22.5726, 88.3639], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {

attribution: 'OpenStreetMap'

}).addTo(map);

let marker;



/* -------------------------
DETECT USER LOCATION
------------------------- */

function getLocation(){

const status = document.getElementById("locationStatus");

status.innerText = "Detecting location...";

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(position){

let lat = position.coords.latitude;
let lon = position.coords.longitude;

map.setView([lat, lon], 16);


/* Remove previous marker */

if(marker){
map.removeLayer(marker);
}


/* Create draggable marker */

marker = L.marker([lat, lon], {draggable:true})
.addTo(map)
.bindPopup("Drag this pin to the waste location")
.openPopup();


/* Save coordinates */

document.getElementById("lat").value = lat;
document.getElementById("lon").value = lon;


/* Update when marker dragged */

marker.on("dragend", function(){

let position = marker.getLatLng();

document.getElementById("lat").value = position.lat;
document.getElementById("lon").value = position.lng;

status.innerText = "Location updated ✔";

});


status.innerText = "Location detected. Drag the pin if needed.";

});

}

}



/* -------------------------
CLICK MAP TO MOVE MARKER
------------------------- */

map.on("click", function(e){

if(marker){

marker.setLatLng(e.latlng);

document.getElementById("lat").value = e.latlng.lat;
document.getElementById("lon").value = e.latlng.lng;

}

});


</script>

{% endblock content %}
